<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>飆股管家 - 專業策略選股系統</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="">
    <!-- Full Screen Loader -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loader-content">
      <div class="loader-spinner"></div>
      <div class="loader-text">飆股<span>管家</span></div>
    </div>
  </div>

  <div class="app-container">
      <!-- Sidebar Placeholder -->
      <div id="sidebar-placeholder"></div>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Dashboard Top Bar (Desktop) -->
        <div class="top-bar">
          <div class="search-container">
            <span class="material-icons search-icon">search</span>
            <input type="text" placeholder="搜尋股名或代號...">
          </div>
          <div class="top-actions">
            <button class="icon-btn" id="desktop-theme-toggle"><span class="material-icons">light_mode</span></button>
            <button class="icon-btn"><span class="material-icons">notifications</span></button>
            <div class="user-profile-small">
            <a href="login.html" class="avatar-small"><span class="material-icons">logout</span></a>
            </div>
          </div>
        </div>
        <header class="mobile-header">
          <div class="logo-container">
            <div class="logo-icon"><span class="material-icons">trending_up</span></div>
            <h2 class="logo-text">飆股<span>管家</span></h2>
          </div>
          <div class="top-actions">
            <button class="icon-btn" id="mobile-theme-toggle"><span class="material-icons">dark_mode</span></button>
            <button class="icon-btn"><span class="material-icons">notifications</span></button>
          </div>
        </header>

        <section class="content-header">
          <div class="title-area">
            <h2><span class="title-emoji">📈</span> AI分析個股</h2>
          </div>
          <div class="action-area">
            <button class="btn btn-secondary">匯出報表</button>
            <button class="btn btn-primary" id="refresh-btn">重新整理</button>
          </div>
        </section>

        <!-- Dashboard Stats -->

        
        <!-- Strategy History Slider (Calendar Style) -->
        <section class="history-section calendar-style">
          <div class="calendar-nav-title">策略歷史紀錄</div>
          <div class="calendar-controls-wrapper">
            <div class="nav-arrow swiper-button-prev"><span class="material-icons">chevron_left</span></div>
            <div class="calendar-container swiper">
              <div class="history-grid swiper-wrapper" id="history-tracker">
                <!-- Slides populated by JS -->
              </div>
            </div>
            <div class="nav-arrow swiper-button-next"><span class="material-icons">chevron_right</span></div>
          </div>
        </section>

        <!-- Main Data Table -->
        <div class="table-header-group">
          <h3 class="table-section-title"><span id="table-title-date">2026-03-17</span> AI深度量化分析 - <span id="table-stock-count">0</span> 筆</h3>
          <div class="last-update" id="last-update-time">最後更新：----/--/-- --:--:--</div>
        </div>
        <div class="table-container">

          <div class="scroll-wrapper">
            <table id="stock-table">
              <thead>
                <tr>
                  <th class="sticky-col-1">股名/股號</th>
                  <th class="sortable text-center" data-sort="score">評分 <span class="material-icons sort-icon">sort</span></th>
                  <th class="sortable text-center" data-sort="price">收盤價 <span class="material-icons sort-icon">sort</span></th>
                  <th class="sortable text-center" data-sort="change">漲跌/漲跌幅 <span class="material-icons sort-icon">sort</span></th>
                  <th class="text-center">破 5 日前高</th>
                  <th class="text-center">量能</th>
                  <th class="text-center">KDJ</th>
                  <th class="text-center">MACD</th>
                  <th class="sortable text-center" data-sort="rsi">RSI <span class="material-icons sort-icon">sort</span></th>
                  <th class="sortable text-center" data-sort="eps">EPS <span class="material-icons sort-icon">sort</span></th>
                  <th class="sortable text-center" data-sort="yield">殖利率 <span class="material-icons sort-icon">sort</span></th>
                  <th>產業別</th>
                  <th class="sortable text-center" data-sort="bias">乖離率 <span class="material-icons sort-icon">sort</span></th>
                  <th class="sortable text-center" data-sort="gain10">10日漲幅 <span class="material-icons sort-icon">sort</span></th>
                  <th class="text-center">優先級</th>
                  <th class="text-center">自選</th>
                </tr>
              </thead>
              <tbody id="stock-data-body">
                <!-- Data populated by JS -->
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="components/loader.js"></script>
    <script src="ai_script.js"></script>
  </body>
</html>
