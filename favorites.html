<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的自選 - 飆股管家</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="">
    <!-- Full Screen Loader -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loader-content">
      <div class="loader-spinner"></div>
      <div class="loader-text">飆股<span>管家</span></div>
    </div>
  </div>

  <div class="app-container">
      <!-- Sidebar Placeholder -->
      <div id="sidebar-placeholder"></div>

      <!-- Main Content -->
      <main class="main-content">
        <!-- Dashboard Top Bar (Desktop) -->
        <div class="top-bar">

          <div class="top-actions">
            <button class="icon-btn" id="desktop-theme-toggle">☀️</button>
            <button class="icon-btn">🔔</button>
            <div class="user-profile-small">
              <a href="login.html" class="icon-btn logout-desktop" title="登出系統">
                <span class="material-icons">logout</span>
              </a>
            </div>
          </div>
        </div>
        <header class="mobile-header">
          <div class="logo-container">
            <div class="logo-icon"><span class="material-icons">trending_up</span></div>
            <h2 class="logo-text">飆股<span>管家</span></h2>
          </div>
          <div class="top-actions">
            <button class="icon-btn" id="mobile-theme-toggle">☀️</button>
            <button class="icon-btn">🔔</button>
            <a href="login.html" class="icon-btn logout-mobile" title="登出系統">
              <span class="material-icons">logout</span>
            </a>
          </div>
        </header>

        <section class="content-header">
          <div class="title-area">
            <h2><span class="title-emoji">⭐</span> 我的自選個股</h2>
            <div class="favorites-limit-info">
              <span class="material-icons">info</span>
              我的自選股上限為 5 筆
            </div>
          </div>
          <div class="action-area">

            <button class="btn btn-secondary btn-sm" id="refresh-btn">
              <span class="material-icons">refresh</span> 重新整理
            </button>
          </div>
        </section>

        <!-- Main Data Table -->
        <div class="table-header-group">
          <h3 class="table-section-title">自選股清單 - <span id="table-stock-count">0</span> 筆</h3>
          <div class="last-update" id="last-update-time">最後更新：----/--/-- --:--:--</div>
        </div>
        <div class="table-container">
          <div class="scroll-wrapper">
            <table id="stock-table">
              <thead>
                <tr>
                  <th class="sticky-col-1">股名/股號</th>
                  <th class="sortable text-center" data-sort="price">收盤價 <span class="material-icons sort-icon">sort</span></th>
                  <th class="sortable text-center" data-sort="change">漲跌/漲跌幅 <span class="material-icons sort-icon">sort</span></th>
                  <th class="text-center">破前高</th>
                  <th class="text-center">量能</th>
                  <th class="text-center">KDJ</th>
                  <th class="text-center">MACD</th>
                  <th class="sortable text-center" data-sort="rsi">RSI <span class="material-icons sort-icon">sort</span></th>
                  <th class="sortable text-center" data-sort="eps">EPS <span class="material-icons sort-icon">sort</span></th>
                  <th class="sortable text-center" data-sort="yield">殖利率 <span class="material-icons sort-icon">sort</span></th>
                  <th>產業別</th>
                  <th class="sortable text-center" data-sort="addedDays">已加入天數 <span class="material-icons sort-icon">sort</span></th>
                  <th class="sortable text-center" data-sort="roi">報酬率 <span class="material-icons sort-icon">sort</span></th>
                  <th class="text-center">刪除</th>
                </tr>
              </thead>
              <tbody id="stock-data-body">
                <!-- Data populated by JS -->
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="components/loader.js"></script>
    <script src="js/favorites_script.js"></script>
  </body>
</html>
