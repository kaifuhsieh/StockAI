<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>忘記密碼 - 飆股管家</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link rel="stylesheet" href="css/style.css" />
    <style>
      /* ── 容器寬度與 login.html 一致 ── */
      .login-container { max-width: 440px; }
      /* login-card 有 align-items:center，需手動讓步驟面板撐滿 */
      .step-panel { width: 100%; }
      .login-actions .form-group input,
      .password-wrap input {
        width: 100%;
        box-sizing: border-box;
        padding: 1rem 1.1rem;
        font-size: 1rem;
        height: auto;
      }
      /* ── 步驟指示器 ── */
      .steps-indicator {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0;
        margin: 0 0 2rem 0;
      }
      .step-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        position: relative;
      }
      .step-circle {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 600;
        border: 2px solid var(--border-color, #333);
        color: var(--text-secondary, #888);
        background: transparent;
        transition: all 0.3s ease;
      }
      .step-item.active .step-circle {
        background: var(--accent, #00d4ff);
        border-color: var(--accent, #00d4ff);
        color: #fff;
        box-shadow: 0 0 14px rgba(0, 212, 255, 0.45);
      }
      .step-item.done .step-circle {
        background: #22c55e;
        border-color: #22c55e;
        color: #fff;
      }
      .step-label {
        font-size: 11px;
        color: var(--text-secondary, #888);
        white-space: nowrap;
      }
      .step-item.active .step-label {
        color: var(--accent, #00d4ff);
        font-weight: 600;
      }
      .step-item.done .step-label {
        color: #22c55e;
      }
      .step-line {
        width: 48px;
        height: 2px;
        background: var(--border-color, #333);
        margin: 0 4px;
        margin-bottom: 22px;
        flex-shrink: 0;
        transition: background 0.3s ease;
      }
      .step-line.done {
        background: #22c55e;
      }

      /* ── 步驟面板 ── */
      .step-panel {
        display: none;
        animation: fadeIn 0.35s ease;
      }
      .step-panel.active {
        display: block;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }

      /* ── OTP 輸入框 ── */
      .otp-group {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin: 0.5rem 0 1.25rem;
      }
      .otp-group input {
        width: 46px !important;
        height: 54px;
        text-align: center;
        font-size: 22px;
        font-weight: 700;
        padding: 0 !important;
        border-radius: 10px;
      }

      /* ── 密碼強度條 ── */
      .strength-bar-wrap {
        display: flex;
        gap: 6px;
        margin: 6px 0 4px;
      }
      .strength-seg {
        flex: 1;
        height: 4px;
        border-radius: 4px;
        background: var(--border-color, #333);
        transition: background 0.3s;
      }
      .strength-label {
        font-size: 11px;
        color: var(--text-secondary, #888);
        margin-bottom: 0.75rem;
      }

      /* ── 成功畫面 ── */
      .success-icon {
        width: 72px;
        height: 72px;
        border-radius: 50%;
        background: rgba(34, 197, 94, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 1.25rem;
      }
      .success-icon .material-icons {
        font-size: 40px;
        color: #22c55e;
      }
      .success-title {
        font-size: 1.2rem;
        font-weight: 700;
        color: var(--text-primary, #fff);
        text-align: center;
        margin-bottom: 0.5rem;
      }
      .success-desc {
        font-size: 0.85rem;
        color: var(--text-secondary, #888);
        text-align: center;
        line-height: 1.6;
        margin-bottom: 1.75rem;
      }

      /* ── 提示文字 ── */
      .hint-text {
        font-size: 0.82rem;
        color: var(--text-secondary, #888);
        text-align: center;
        margin-bottom: 1.5rem;
        line-height: 1.6;
      }
      .hint-text strong {
        color: var(--accent, #00d4ff);
      }

      /* ── 重傳計時 ── */
      .resend-row {
        text-align: center;
        font-size: 0.82rem;
        color: var(--text-secondary, #888);
        margin-bottom: 1.25rem;
      }
      .resend-row a {
        color: var(--accent, #00d4ff);
        cursor: pointer;
        text-decoration: none;
      }
      .resend-row a.disabled {
        color: var(--text-secondary, #888);
        pointer-events: none;
      }

      /* ── 密碼輸入包裹 (顯示/隱藏) ── */
      .password-wrap {
        position: relative;
      }
      .password-wrap input {
        padding-right: 2.8rem !important;
      }
      .toggle-pw {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text-secondary, #888);
        padding: 0;
        display: flex;
        align-items: center;
      }
    </style>
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#151b2c" />
  </head>
  <body class="login-page">
    <div class="login-container">
      <div class="login-card">

        <!-- Logo -->
        <div class="login-logo">
          <div class="logo-icon"><span class="material-icons">trending_up</span></div>
          <h1 class="logo-text">飆股<span>管家</span></h1>
        </div>

        <!-- 步驟指示器 -->
        <div class="steps-indicator">
          <div class="step-item active" id="si-1">
            <div class="step-circle">1</div>
            <div class="step-label">輸入信箱</div>
          </div>
          <div class="step-line" id="sl-1"></div>
          <div class="step-item" id="si-2">
            <div class="step-circle">2</div>
            <div class="step-label">驗證碼</div>
          </div>
          <div class="step-line" id="sl-2"></div>
          <div class="step-item" id="si-3">
            <div class="step-circle">3</div>
            <div class="step-label">重設密碼</div>
          </div>
        </div>

        <!-- ── Step 1：輸入信箱 ── -->
        <div class="step-panel active" id="panel-1">
          <p class="hint-text">請輸入您的註冊信箱，<br>我們將發送驗證碼至您的信箱。</p>
          <div class="login-actions">
            <div class="form-group">
              <label>電子郵件</label>
              <input type="email" id="email-input" placeholder="請輸入電子郵件" />
            </div>
            <button class="btn btn-primary login-submit-btn" id="btn-send-otp" onclick="goStep2()">
              <span class="material-icons" style="font-size:18px;vertical-align:middle;margin-right:6px;">send</span>
              發送驗證碼
            </button>
          </div>
        </div>

        <!-- ── Step 2：驗證碼 ── -->
        <div class="step-panel" id="panel-2">
          <p class="hint-text">驗證碼已發送至<br><strong id="email-display"></strong></p>
          <div class="otp-group">
            <input type="text" maxlength="1" class="otp-input" id="otp-0" inputmode="numeric" />
            <input type="text" maxlength="1" class="otp-input" id="otp-1" inputmode="numeric" />
            <input type="text" maxlength="1" class="otp-input" id="otp-2" inputmode="numeric" />
            <input type="text" maxlength="1" class="otp-input" id="otp-3" inputmode="numeric" />
            <input type="text" maxlength="1" class="otp-input" id="otp-4" inputmode="numeric" />
            <input type="text" maxlength="1" class="otp-input" id="otp-5" inputmode="numeric" />
          </div>
          <div class="resend-row">
            未收到驗證碼？
            <a id="resend-link" class="disabled">重新發送（<span id="countdown">60</span>s）</a>
          </div>
          <div class="login-actions" style="padding-top:0;">
            <button class="btn btn-primary login-submit-btn" onclick="goStep3()">
              <span class="material-icons" style="font-size:18px;vertical-align:middle;margin-right:6px;">verified</span>
              確認驗證碼
            </button>
          </div>
        </div>

        <!-- ── Step 3：重設密碼 ── -->
        <div class="step-panel" id="panel-3">
          <p class="hint-text">請設定您的新密碼</p>
          <div class="login-actions">
            <div class="form-group">
              <label>新密碼</label>
              <div class="password-wrap">
                <input type="password" id="new-pw" placeholder="至少 8 個字元" oninput="checkStrength(this.value)" />
                <button class="toggle-pw" type="button" onclick="togglePw('new-pw', this)">
                  <span class="material-icons" style="font-size:20px;">visibility_off</span>
                </button>
              </div>
              <div class="strength-bar-wrap">
                <div class="strength-seg" id="seg-1"></div>
                <div class="strength-seg" id="seg-2"></div>
                <div class="strength-seg" id="seg-3"></div>
                <div class="strength-seg" id="seg-4"></div>
              </div>
              <div class="strength-label" id="strength-label">密碼強度：—</div>
            </div>
            <div class="form-group">
              <label>確認新密碼</label>
              <div class="password-wrap">
                <input type="password" id="confirm-pw" placeholder="請再輸入一次密碼" />
                <button class="toggle-pw" type="button" onclick="togglePw('confirm-pw', this)">
                  <span class="material-icons" style="font-size:20px;">visibility_off</span>
                </button>
              </div>
            </div>
            <button class="btn btn-primary login-submit-btn" onclick="goSuccess()">
              <span class="material-icons" style="font-size:18px;vertical-align:middle;margin-right:6px;">lock_reset</span>
              重設密碼
            </button>
          </div>
        </div>

        <!-- ── Step 4：成功 ── -->
        <div class="step-panel" id="panel-success">
          <div class="success-icon">
            <span class="material-icons">check_circle</span>
          </div>
          <div class="success-title">密碼重設成功！</div>
          <div class="success-desc">您的密碼已更新，<br>請使用新密碼重新登入。</div>
          <button class="btn btn-primary login-submit-btn" onclick="location.href='login.html'">
            <span class="material-icons" style="font-size:18px;vertical-align:middle;margin-right:6px;">login</span>
            前往登入
          </button>
        </div>

        <!-- Footer -->
        <div class="login-footer" style="margin-top:1.5rem;">
          <a href="login.html">← 返回登入</a>
        </div>
      </div>

      <div class="login-copyright">
        &copy; 2026 飆股管家 專業策略選股系統. All rights reserved.
      </div>
    </div>

    <script>
      /* ── 步驟切換 ── */
      function showStep(n) {
        document.querySelectorAll('.step-panel').forEach(p => p.classList.remove('active'));
        const panel = document.getElementById(n === 'success' ? 'panel-success' : 'panel-' + n);
        if (panel) panel.classList.add('active');
      }

      function setStepDone(n) {
        const si = document.getElementById('si-' + n);
        if (si) {
          si.classList.remove('active');
          si.classList.add('done');
          si.querySelector('.step-circle').innerHTML = '<span class="material-icons" style="font-size:16px;">check</span>';
        }
        const sl = document.getElementById('sl-' + n);
        if (sl) sl.classList.add('done');
      }

      function setStepActive(n) {
        const si = document.getElementById('si-' + n);
        if (si) si.classList.add('active');
      }

      /* ── Step 1 → Step 2 ── */
      function goStep2() {
        const email = document.getElementById('email-input').value.trim();
        if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          alert('請輸入有效的電子郵件！');
          return;
        }
        document.getElementById('email-display').textContent = email;
        setStepDone(1);
        setStepActive(2);
        showStep(2);
        startCountdown();
      }

      /* ── Step 2 → Step 3 ── */
      function goStep3() {
        const code = Array.from(document.querySelectorAll('.otp-input')).map(i => i.value).join('');
        if (code.length < 6) {
          alert('請輸入完整的 6 位驗證碼！');
          return;
        }
        setStepDone(2);
        setStepActive(3);
        showStep(3);
      }

      /* ── Step 3 → 成功 ── */
      function goSuccess() {
        const pw = document.getElementById('new-pw').value;
        const cpw = document.getElementById('confirm-pw').value;
        if (pw.length < 8) {
          alert('密碼至少需要 8 個字元！');
          return;
        }
        if (pw !== cpw) {
          alert('兩次輸入的密碼不一致！');
          return;
        }
        setStepDone(3);
        showStep('success');
      }

      /* ── OTP 自動跳欄 ── */
      document.querySelectorAll('.otp-input').forEach((input, idx, arr) => {
        input.addEventListener('input', () => {
          input.value = input.value.replace(/\D/g, '').slice(0, 1);
          if (input.value && idx < arr.length - 1) arr[idx + 1].focus();
        });
        input.addEventListener('keydown', e => {
          if (e.key === 'Backspace' && !input.value && idx > 0) arr[idx - 1].focus();
        });
      });

      /* ── 倒數計時 + 重傳 ── */
      let timer = null;
      function startCountdown() {
        clearInterval(timer);
        let sec = 60;
        const link = document.getElementById('resend-link');
        const cd = document.getElementById('countdown');
        link.classList.add('disabled');
        timer = setInterval(() => {
          sec--;
          cd.textContent = sec;
          if (sec <= 0) {
            clearInterval(timer);
            link.classList.remove('disabled');
            link.innerHTML = '重新發送';
            link.onclick = () => {
              link.innerHTML = '重新發送（<span id="countdown">60</span>s）';
              startCountdown();
            };
          }
        }, 1000);
      }

      /* ── 密碼強度 ── */
      function checkStrength(val) {
        let score = 0;
        if (val.length >= 8)  score++;
        if (/[A-Z]/.test(val)) score++;
        if (/[0-9]/.test(val)) score++;
        if (/[^A-Za-z0-9]/.test(val)) score++;

        const colors = ['#ef4444', '#f97316', '#eab308', '#22c55e'];
        const labels = ['太弱', '尚可', '強', '非常強'];
        const segs = document.querySelectorAll('.strength-seg');
        segs.forEach((s, i) => {
          s.style.background = i < score ? colors[score - 1] : '';
        });
        document.getElementById('strength-label').textContent =
          score === 0 ? '密碼強度：—' : '密碼強度：' + labels[score - 1];
      }

      /* ── 顯示/隱藏密碼 ── */
      function togglePw(id, btn) {
        const inp = document.getElementById(id);
        const icon = btn.querySelector('.material-icons');
        if (inp.type === 'password') {
          inp.type = 'text';
          icon.textContent = 'visibility';
        } else {
          inp.type = 'password';
          icon.textContent = 'visibility_off';
        }
      }
    </script>
  </body>
</html>
